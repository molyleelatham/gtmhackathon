name: Test

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    env:
      REQUIRE_FIREBASE_AUTH: "false"
      SEED_DEMO_DATA: "true"
      USE_FIRESTORE_STORE: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run pytest -m "not external" --cov=apps --cov=packages --cov=infra --cov-report=term-missing

      - name: Ruff
        run: uv run ruff check apps infra packages tests

  smoke-docker:
    name: Docker smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Docker smoke
        run: bash scripts/docker_smoke_test.sh

  web:
    name: Web tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      VITE_E2E_BYPASS_AUTH: "true"
      VITE_API_BASE_URL: "https://warmth-api-30164818817.us-central1.run.app"
      REQUIRE_FIREBASE_AUTH: "false"
      SEED_DEMO_DATA: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (API for E2E)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install API dependencies
        run: uv sync --extra dev
        working-directory: ${{ github.workspace }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Vitest
        run: npm run test

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  ios:
    name: iOS tests
    runs-on: macos-15
    defaults:
      run:
        working-directory: iOS/Warmth-iOS
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Boot simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -m1 "iPhone 17 Pro" | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          if [ -z "$DEVICE" ]; then
            DEVICE=$(xcrun simctl list devices available | grep -m1 "iPhone" | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          fi
          echo "SIMULATOR_ID=$DEVICE" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE" 2>/dev/null || true

      - name: Run unit and UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Warmth \
            -destination "platform=iOS Simulator,id=${SIMULATOR_ID}" \
            -resultBundlePath TestResults.xcresult \
            | xcpretty
        continue-on-error: false

      - name: Retry iOS tests once on failure
        if: failure()
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Warmth \
            -destination "platform=iOS Simulator,id=${SIMULATOR_ID}" \
            -resultBundlePath TestResults-retry.xcresult \
            | xcpretty

      - name: Build WarmthWatch (watchOS)
        continue-on-error: true
        run: |
          WATCH=$(xcrun simctl list devices available | grep -m1 "Apple Watch" | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/' || true)
          if [ -n "$WATCH" ]; then
            xcodebuild build \
              -scheme WarmthWatch \
              -destination "platform=watchOS Simulator,id=$WATCH" \
              | xcpretty
          else
            echo "No watchOS simulator available; skipping WarmthWatch build"
          fi

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: iOS/Warmth-iOS/TestResults*.xcresult
          retention-days: 7
