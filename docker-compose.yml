version: '3.8'

services:
  # FastAPI backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - ZERO_CRM_API_KEY=${ZERO_CRM_API_KEY}
      - UNIFY_GTM_API_KEY=${UNIFY_GTM_API_KEY}
      - LIGHTFERN_WEBHOOK_URL=${LIGHTFERN_WEBHOOK_URL}
      - CURSOR_SDK_API_KEY=${CURSOR_SDK_API_KEY}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_SERVICE_ACCOUNT_KEY=${FIREBASE_SERVICE_ACCOUNT_KEY}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_SERVICE_ACCOUNT_KEY=${GCP_SERVICE_ACCOUNT_KEY}
    volumes:
      - .:/app
    command: uv run uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - listener

  # Listener service
  listener:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - FIREBASE_SERVICE_ACCOUNT_KEY=${FIREBASE_SERVICE_ACCOUNT_KEY}
    volumes:
      - .:/app
    command: uv run python apps/listener/main.py
    restart: unless-stopped

volumes:
  app_data: