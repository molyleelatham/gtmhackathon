version: '3.8'

services:
  google-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - GOOGLE_MCP_CREDENTIALS=${GOOGLE_MCP_CREDENTIALS}
      - WARMTH_CLIENT_EMAIL=${WARMTH_CLIENT_EMAIL:-getwarmth@gmail.com}
    volumes:
      - .:/app
    command: uv run uvicorn warmth.services.google_mcp_server.main:app --host 0.0.0.0 --port 3000

  # FastAPI backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - ZERO_CRM_API_KEY=${ZERO_CRM_API_KEY}
      - UNIFY_GTM_API_KEY=${UNIFY_GTM_API_KEY}
      - LIGHTFERN_WEBHOOK_URL=${LIGHTFERN_WEBHOOK_URL}
      - CURSOR_SDK_API_KEY=${CURSOR_SDK_API_KEY}
      - GOOGLE_MCP_CREDENTIALS=${GOOGLE_MCP_CREDENTIALS}
      - GOOGLE_MCP_SERVER_URL=${GOOGLE_MCP_SERVER_URL}
      - WEB_ALLOWED_ORIGINS=${WEB_ALLOWED_ORIGINS}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_SERVICE_ACCOUNT_KEY=${FIREBASE_SERVICE_ACCOUNT_KEY}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_SERVICE_ACCOUNT_KEY=${GCP_SERVICE_ACCOUNT_KEY}
    volumes:
      - .:/app
    command: uv run uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - listener

  # Listener service
  listener:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - FIREBASE_SERVICE_ACCOUNT_KEY=${FIREBASE_SERVICE_ACCOUNT_KEY}
    volumes:
      - .:/app
    command: uv run python apps/listener/main.py
    restart: unless-stopped

volumes:
  app_data: