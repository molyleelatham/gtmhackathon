name: Warmth
options:
  bundleIdPrefix: com.warmth
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 7JN8C5W7G7
    CODE_SIGN_STYLE: Automatic
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.0.0"

# NOTE: The Apple Watch app + complication targets (WarmthWatch / WarmthWatchWidget)
# are temporarily removed from the build to ship the iOS app to a physical device
# quickly. The watch source files (WarmthWatch/, WarmthWatchWidget/) and
# WATCH_INTEGRATION.md are left untouched on disk so the watch build can be resumed.
targets:
  Warmth:
    type: application
    platform: iOS
    sources:
      - path: Warmth-iOS/Warmth
        excludes:
          - "Resources/Info.plist"
          - "Resources/Brand/**"
          - "**/.DS_Store"
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.warmth.gtmhackathon
        PRODUCT_NAME: Warmth
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        OTHER_LDFLAGS: ["$(inherited)", "-ObjC"]
    info:
      path: Warmth-iOS/Warmth/Resources/Info.plist
      properties:
        CFBundleDisplayName: Warmth
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: "Warmth listens for your trigger phrase and transcribes conversations entirely on-device."
        NSSpeechRecognitionUsageDescription: "Warmth uses on-device speech recognition to know when a conversation starts and to transcribe it."
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - com.googleusercontent.apps.30164818817-uf5obaqeklj1igk2jan08uqeg4pfmrru
        UIAppFonts:
          - SpaceGrotesk-Light.ttf
          - SpaceGrotesk-Regular.ttf
          - SpaceGrotesk-Medium.ttf
          - SpaceGrotesk-SemiBold.ttf
          - SpaceGrotesk-Bold.ttf

  WarmthTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Warmth-iOS/WarmthTests
    dependencies:
      - target: Warmth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.warmth.gtmhackathon.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Warmth:
    build:
      targets:
        Warmth: all
        WarmthTests: [test]
    test:
      targets:
        - WarmthTests
