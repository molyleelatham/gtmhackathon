name: Warmth
options:
  bundleIdPrefix: com.warmth
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 6Q3AVN73Z6
    CODE_SIGN_STYLE: Automatic
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.0.0"

# NOTE: WarmthWatch / WarmthWatchWidget targets are included for standalone watch
# builds. The iOS app does not embed them until watchOS simulators/runtimes are
# installed — see WATCH_INTEGRATION.md to re-enable the embed dependency.
targets:
  Warmth:
    type: application
    platform: iOS
    sources:
      - path: Warmth-iOS/Warmth
        excludes:
          - "Resources/Info.plist"
          - "Resources/Brand/**"
          - "**/.DS_Store"
          # Legacy duplicate of Services/SocialGraph/SocialGraphEngine.swift
          - "Services/SocialGraphEngine.swift"
          - "Services/ConferenceListeningEngine.swift"
          - "Services/WakeWordEngine.swift"
          - "Services/SignalAPIClient.swift"
          - "Services/AudioSessionManager.swift"
          - "Services/CaptureWindow.swift"
          - "Services/MicrophoneStream.swift"
          - "Models/Signal.swift"
          - "Models/ICPVocabulary.swift"
          - "Views/ListeningView.swift"
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.warmth.gtmhackathon
        PRODUCT_NAME: Warmth
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        OTHER_LDFLAGS: ["$(inherited)", "-ObjC"]
    info:
      path: Warmth-iOS/Warmth/Resources/Info.plist
      properties:
        CFBundleDisplayName: Warmth
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: "Warmth listens for your trigger phrase and transcribes conversations entirely on-device."
        NSSpeechRecognitionUsageDescription: "Warmth uses on-device speech recognition to know when a conversation starts and to transcribe it."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - com.googleusercontent.apps.30164818817-uf5obaqeklj1igk2jan08uqeg4pfmrru
        UIAppFonts:
          - SpaceGrotesk-Light.ttf
          - SpaceGrotesk-Regular.ttf
          - SpaceGrotesk-Medium.ttf
          - SpaceGrotesk-SemiBold.ttf
          - SpaceGrotesk-Bold.ttf

  WarmthTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Warmth-iOS/WarmthTests
    dependencies:
      - target: Warmth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.warmth.gtmhackathon.tests
        GENERATE_INFOPLIST_FILE: YES

  WarmthWatch:
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: Warmth-iOS/WarmthWatch
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
    dependencies:
      - target: WarmthWatchWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.warmth.gtmhackathon.watchkitapp
        PRODUCT_NAME: Warmth
        TARGETED_DEVICE_FAMILY: "4"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        WATCHOS_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_ENTITLEMENTS: Warmth-iOS/WarmthWatch/WarmthWatch.entitlements
    info:
      path: Warmth-iOS/WarmthWatch/Info.plist
      properties:
        CFBundleDisplayName: Warmth
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.warmth.gtmhackathon
        UIAppFonts:
          - SpaceGrotesk-Regular.ttf
          - SpaceGrotesk-Medium.ttf
          - SpaceGrotesk-SemiBold.ttf
          - SpaceGrotesk-Bold.ttf

  WarmthWatchWidget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: Warmth-iOS/WarmthWatchWidget
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
      - path: Warmth-iOS/WarmthWatch/Shared/WatchSharedState.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.warmth.gtmhackathon.watchkitapp.complication
        PRODUCT_NAME: WarmthWatchWidget
        TARGETED_DEVICE_FAMILY: "4"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        WATCHOS_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_ENTITLEMENTS: Warmth-iOS/WarmthWatchWidget/WarmthWatchWidget.entitlements
    info:
      path: Warmth-iOS/WarmthWatchWidget/Info.plist
      properties:
        CFBundleDisplayName: Warmth
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  Warmth:
    build:
      targets:
        Warmth: all
        WarmthTests: [test]
    test:
      targets:
        - WarmthTests

  WarmthWatch:
    build:
      targets:
        WarmthWatch: all
    run:
      config: Debug
